<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pay If You Like — Dashboard</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg-base:    #0d1117;
      --bg-card:    #161b22;
      --bg-header:  #1c2128;
      --border:     #30363d;
      --text-muted: #8b949e;
      --green:      #3fb950;
      --blue:       #58a6ff;
      --red:        #f85149;
      --purple:     #bc8cff;
      --orange:     #e3b341;
    }

    body { background: var(--bg-base); color: #e6edf3; font-size: 0.9rem; }

    .navbar-custom {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      height: 58px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .card-header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.85rem;
      padding: 0.65rem 1rem;
      letter-spacing: 0.02em;
    }

    /* ── Stat cards ── */
    .stat-card .icon-wrap {
      width: 46px; height: 46px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .stat-card .stat-value {
      font-size: 1.7rem; font-weight: 700; line-height: 1.1;
    }
    .stat-card .stat-label { color: var(--text-muted); font-size: 0.78rem; }
    .stat-card .stat-sub   { color: var(--text-muted); font-size: 0.72rem; margin-top: 2px; }

    /* ── Server table ── */
    .table { --bs-table-bg: transparent; --bs-table-hover-bg: var(--bg-header); }
    .table thead th {
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      border-bottom-color: var(--border);
      font-weight: 500;
    }
    .table td { vertical-align: middle; border-bottom-color: var(--border); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px;
    }
    .dot-online  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-offline { background: var(--red); }
    .dot-disabled{ background: var(--text-muted); }

    /* ── Misc ── */
    .last-updated { color: var(--text-muted); font-size: 0.77rem; }
    .chart-wrap   { position: relative; }
    .spinner-wrap { display: flex; align-items: center; justify-content: center; min-height: 160px; }

    .badge-default {
      background: var(--orange);
      color: #000;
      font-size: 0.65rem;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
    }

    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
      margin-top: 0.4rem;
    }
  </style>
</head>

<body>

<!-- Nav -->
<nav class="navbar navbar-custom px-4 d-flex align-items-center justify-content-between">
  <span class="fw-bold" style="font-size:1rem;">♟️ Pay If You Like &mdash; Dashboard</span>
  <div class="d-flex align-items-center gap-3">
    <span class="last-updated" id="last-updated">Loading…</span>
    <button class="btn btn-sm btn-outline-secondary" id="refresh-btn" onclick="loadAll()">
      <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
  </div>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- ── Stat Cards ── -->
  <p class="section-title">Overview</p>
  <div class="row g-3 mb-4" id="stat-cards">
    <div class="col-12">
      <div class="spinner-wrap"><div class="spinner-border text-secondary" role="status"></div></div>
    </div>
  </div>

  <!-- ── Timeline + Pie ── -->
  <p class="section-title">Acquisition</p>
  <div class="row g-3 mb-4">
    <div class="col-xl-8">
      <div class="card h-100">
        <div class="card-header">
          <i class="bi bi-graph-up-arrow me-2 text-primary"></i>New Users — Last 30 Days
        </div>
        <div class="card-body chart-wrap" style="height:270px;">
          <div class="spinner-wrap" id="timeline-spinner">
            <div class="spinner-border text-secondary" role="status"></div>
          </div>
          <canvas id="timelineChart" style="display:none;"></canvas>
        </div>
      </div>
    </div>
    <div class="col-xl-4">
      <div class="card h-100">
        <div class="card-header">
          <i class="bi bi-pie-chart me-2 text-warning"></i>User Split
        </div>
        <div class="card-body d-flex flex-column align-items-center justify-content-center" style="height:270px;">
          <canvas id="splitChart" style="max-width:200px; max-height:200px;"></canvas>
          <div id="split-legend" class="mt-3 d-flex gap-3 flex-wrap justify-content-center" style="font-size:0.78rem;"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Servers ── -->
  <p class="section-title">Servers</p>
  <div class="row g-3 mb-4">
    <div class="col-xl-5">
      <div class="card h-100">
        <div class="card-header">
          <i class="bi bi-bar-chart-fill me-2 text-success"></i>Clients per Server
        </div>
        <div class="card-body chart-wrap" style="height:240px;">
          <div class="spinner-wrap" id="serverbar-spinner">
            <div class="spinner-border text-secondary" role="status"></div>
          </div>
          <canvas id="serverBarChart" style="display:none;"></canvas>
        </div>
      </div>
    </div>
    <div class="col-xl-7">
      <div class="card h-100">
        <div class="card-header">
          <i class="bi bi-hdd-network me-2 text-info"></i>Server Status
        </div>
        <div class="card-body p-0" id="server-table-container">
          <div class="spinner-wrap">
            <div class="spinner-border text-secondary" role="status"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
// ── Chart defaults ───────────────────────────────────────────────────────────
const C = {
  blue:    '#58a6ff',
  green:   '#3fb950',
  red:     '#f85149',
  purple:  '#bc8cff',
  orange:  '#e3b341',
  grid:    '#21262d',
  text:    '#8b949e',
};

Chart.defaults.color       = C.text;
Chart.defaults.borderColor = C.grid;

let timelineChart   = null;
let splitChart      = null;
let serverBarChart  = null;

// ── Utilities ────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
  return n;
}

function statCard(icon, iconColor, label, value, sub) {
  return `
    <div class="col-6 col-sm-6 col-md-3">
      <div class="card stat-card p-3 h-100">
        <div class="d-flex align-items-center gap-3">
          <div class="icon-wrap" style="background:${iconColor}18;">${icon}</div>
          <div class="flex-grow-1">
            <div class="stat-value">${value}</div>
            <div class="stat-label">${label}</div>
            ${sub ? `<div class="stat-sub">${sub}</div>` : ''}
          </div>
        </div>
      </div>
    </div>`;
}

// ── Loaders ──────────────────────────────────────────────────────────────────

async function loadStats() {
  const [statsRes, serversRes] = await Promise.all([
    fetch('/api/stats'),
    fetch('/api/servers'),
  ]);
  const stats   = await statsRes.json();
  const servers = await serversRes.json();

  const online  = servers.filter(s => s.online && s.enabled).length;
  const total   = servers.length;

  // Revenue nicely formatted
  const revenue = stats.est_revenue_ks.toLocaleString();

  document.getElementById('stat-cards').innerHTML = [
    statCard('🖥️', C.blue,   'Servers Online',    `${online} / ${total}`,         null),
    statCard('🚀', C.blue,   'Active Free Trials', fmt(stats.free_active),         `${stats.free_expired} expired`),
    statCard('💎', C.green,  'Premium Users',      fmt(stats.premium),              null),
    statCard('💰', C.purple, 'Est. Revenue',        `${revenue} Ks`,               `${stats.premium} × 5,000`),
  ].join('');

  // ── Donut chart ─────────────────────────────────────────────────────────
  const pieData = {
    labels: ['Active Trials', 'Premium', 'Expired'],
    datasets: [{
      data:            [stats.free_active, stats.premium, stats.free_expired],
      backgroundColor: [C.blue, C.green, C.red],
      borderColor:     '#161b22',
      borderWidth:     3,
      hoverOffset:     6,
    }]
  };

  if (splitChart) splitChart.destroy();
  splitChart = new Chart(document.getElementById('splitChart'), {
    type: 'doughnut',
    data: pieData,
    options: {
      cutout: '68%',
      plugins: { legend: { display: false } },
      animation: { duration: 600 },
    },
  });

  // Custom legend
  const legendItems = [
    { label: `Active Trials (${stats.free_active})`, color: C.blue },
    { label: `Premium (${stats.premium})`,           color: C.green },
    { label: `Expired (${stats.free_expired})`,      color: C.red },
  ];
  document.getElementById('split-legend').innerHTML = legendItems.map(item =>
    `<span style="color:${item.color};">
       <i class="bi bi-circle-fill me-1" style="font-size:0.6rem;"></i>${item.label}
     </span>`
  ).join('');

  // ── Server bar chart ─────────────────────────────────────────────────────
  const serverNames  = servers.map(s => s.name);
  const serverCounts = servers.map(s => s.client_count);
  const barColors    = servers.map(s =>
    !s.enabled ? C.text :
    s.online   ? C.green : C.red
  );

  document.getElementById('serverbar-spinner').style.display = 'none';
  document.getElementById('serverBarChart').style.display = 'block';

  if (serverBarChart) serverBarChart.destroy();
  serverBarChart = new Chart(document.getElementById('serverBarChart'), {
    type: 'bar',
    data: {
      labels: serverNames,
      datasets: [{
        label: 'Clients',
        data:  serverCounts,
        backgroundColor: barColors,
        borderRadius: 6,
        borderSkipped: false,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: C.grid } },
        y: {
          beginAtZero: true,
          ticks: { precision: 0 },
          grid: { color: C.grid },
        },
      },
      animation: { duration: 500 },
    },
  });

  // ── Server status table ──────────────────────────────────────────────────
  const rows = servers.map(s => {
    let dotClass, statusText;
    if (!s.enabled) {
      dotClass   = 'dot-disabled';
      statusText = 'Disabled';
    } else if (s.online) {
      dotClass   = 'dot-online';
      statusText = 'Online';
    } else {
      dotClass   = 'dot-offline';
      statusText = 'Offline';
    }

    const defBadge = s.is_default ? '<span class="badge-default">DEFAULT</span>' : '';
    const clients  = s.online ? s.client_count : '—';
    const up       = s.online ? s.upload       : '—';
    const down     = s.online ? s.download     : '—';

    return `
      <tr>
        <td>${s.name}${defBadge}</td>
        <td><span class="status-dot ${dotClass}"></span>${statusText}</td>
        <td>${clients}</td>
        <td><small class="text-success">&uarr; ${up}</small></td>
        <td><small class="text-info">&darr; ${down}</small></td>
      </tr>`;
  }).join('');

  document.getElementById('server-table-container').innerHTML = `
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
          <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Clients</th>
            <th>Upload</th>
            <th>Download</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

async function loadTimeline() {
  const res  = await fetch('/api/timeline');
  const data = await res.json();

  document.getElementById('timeline-spinner').style.display = 'none';
  document.getElementById('timelineChart').style.display = 'block';

  if (timelineChart) timelineChart.destroy();
  timelineChart = new Chart(document.getElementById('timelineChart'), {
    type: 'line',
    data: {
      labels: data.labels,
      datasets: [
        {
          label: 'Free Trials',
          data:  data.free,
          borderColor:     C.blue,
          backgroundColor: C.blue + '1a',
          fill: true,
          tension: 0.4,
          pointRadius:      2,
          pointHoverRadius: 5,
        },
        {
          label: 'Premium',
          data:  data.premium,
          borderColor:     C.green,
          backgroundColor: C.green + '1a',
          fill: true,
          tension: 0.4,
          pointRadius:      2,
          pointHoverRadius: 5,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { boxWidth: 12, padding: 14, font: { size: 12 } },
        },
        tooltip: {
          callbacks: {
            title: items => items[0].label,
          },
        },
      },
      scales: {
        x: {
          ticks: { maxTicksLimit: 10, maxRotation: 0, font: { size: 11 } },
          grid:  { color: C.grid },
        },
        y: {
          beginAtZero: true,
          ticks: { precision: 0, font: { size: 11 } },
          grid:  { color: C.grid },
        },
      },
      animation: { duration: 600 },
    },
  });
}

// ── Master load ──────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>';

  try {
    await Promise.all([loadStats(), loadTimeline()]);
    document.getElementById('last-updated').textContent =
      'Updated: ' + new Date().toLocaleTimeString();
  } catch (e) {
    console.error('Dashboard load error:', e);
    document.getElementById('last-updated').textContent = '⚠ Load error — retrying…';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-arrow-clockwise"></i> Refresh';
  }
}

// Run on load, then auto-refresh every 60 s
loadAll();
setInterval(loadAll, 60_000);
</script>

</body>
</html>
